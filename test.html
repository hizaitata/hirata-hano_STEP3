<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="test.css">
  <title>TNGコーヒーのページです</title>
</head>
<body>

  <header>
    <h1>TNG CAFE</h1>
    <p>心安らぐ一杯をあなたに</p>
    <nav>
    <ul>
      <li><a href="#about_us">About Us</a></li>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  </header>

  <main>
    <section id="about_us">
      <h2>About Us</h2>
      <p>TNGCafeは自然の香りを包まれたリラックス空間を提供しています<br>
      自家焙煎コーヒーと手作りスイーツで、穏やかな時間をお過ごしください</p>
      <div class="main-image">
        <div class="flex-item">
      <img src="TNG_cafe.png" alt="TNG CAFE">
      </div>
      </div>
    </section>

    <section id="menu">
      <h2>Menu</h2>
    
      <div class="menu-aicon">
    
        <div class="flex-item">
          <img src="cofee.png" alt="コーヒー">
          <p>ブレンドコーヒー</p>
        </div>
    
        <div class="flex-item">
          <img src="cake.png" alt="ケーキ">
          <p>ベイクドチーズケーキ</p>
        </div>
    
        <div class="flex-item">
          <img src="cafelate.png" alt="カフェラテ">
          <p>カフェラテ</p>
        </div>
    
      </div>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <form action="#" method="post">
        <label for="name">お名前：</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">メールアドレス：</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="message">お問い合わせ内容：</label><br>
        <textarea id="message" name="message" rows="4" cols="40"></textarea><br><br>
        <button type="submit">送信</button>
      </form>
      </section>

  </main>

  <footer>
    <p>© 2026 TNG Cafe</p>
  </footer>

</body>
</html>
